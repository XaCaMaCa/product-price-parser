run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - gofmt
    - goimports
    - gocyclo
    - revive

linters-settings:
  errcheck:
    # CLI: лог в stderr; иначе сотни fmt.* в проекте
    exclude-functions:
      - fmt.Print
      - fmt.Printf
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint
  gofmt:
    simplify: true
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: unused-parameter
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocyclo
  max-issues-per-linter: 0
  max-same-issues: 0
