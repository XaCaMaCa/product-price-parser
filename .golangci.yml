run:
  timeout: 5m
  go: "1.22"
linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - gofmt
    - goimports
    - gocyclo
    - revive
linters-settings:
  gofmt:
    simplify: true
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: unused-parameter
        disabled: true
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocyclo
    # Главная функция CLI с естественным ветвлением по флагам.
    # При рефакторинге в фазу 5+ выделим стадии в отдельные функции.
    - path: main\.go
      linters:
        - gocyclo
      source: "func run\\("
    # http.RoundTripper для uTLS — естественно сложный из-за proxy/direct и fallback.
    - path: utls_roundtripper\.go
      linters:
        - gocyclo
      source: "RoundTrip\\("
